<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card { width: 100%; max-width: 420px; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; } input { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 14px; border: 1px solid #d0d7de; border-radius: 8px; box-sizing:border-box; }
        button { width: 100%; padding: 12px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; }
        .error { color:#dc2626; margin-bottom:12px; }
        .hint { margin-top: 10px; color:#6b7280; font-size: 0.92rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>Đăng nhập Admin</h2>
    <form method="post" action="/admin/login">
        <label for="username">Tài khoản</label>
        <input id="username" name="username" required placeholder="admin">

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" required placeholder="admin123">

        <div th:if="${loginError}" class="error">Sai tài khoản hoặc mật khẩu.</div>
        <button type="submit">Đăng nhập</button>
    </form>
    <div class="hint">Mặc định: admin / admin123</div>
</div>
</body>
</html>
